[pytest]
# Make the vendored package and repo root importable during collection so that
# `import run_eval` / `import basics_cdss` resolve without `pip install -e .`.
pythonpath = . src
testpaths = tests
markers =
    slow: live re-run of run_eval.py (retrains RandomForest x3); deselected by default
addopts = -m "not slow"
